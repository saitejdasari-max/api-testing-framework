name: API Test Suite

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]
  schedule:
    # Nightly regression run at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, production]
      test_suite:
        description: "Test suite to run"
        required: true
        default: "smoke"
        type: choice
        options: [smoke, regression, integration, all]

# ── Concurrency: cancel in-progress runs on the same branch ────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  ALLURE_VERSION: "2.27.0"

jobs:
  # ── Smoke Tests ──────────────────────────────────────────────────────────
  smoke:
    name: Smoke Tests (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p logs reports/html reports/allure-results

      - name: Run smoke tests
        env:
          ENV: ${{ github.event.inputs.environment || 'dev' }}
          DEV_BASE_URL: ${{ secrets.DEV_BASE_URL || 'https://jsonplaceholder.typicode.com' }}
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL || '' }}
          PROD_BASE_URL: ${{ secrets.PROD_BASE_URL || '' }}
          AUTH_USERNAME: ${{ secrets.AUTH_USERNAME || '' }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD || '' }}
          API_KEY: ${{ secrets.API_KEY || '' }}
          LOG_LEVEL: INFO
        run: |
          pytest tests/smoke \
            -m smoke \
            --alluredir=reports/allure-results \
            --html=reports/html/smoke_report.html \
            --self-contained-html \
            -v

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-html-report
          path: reports/html/smoke_report.html

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-allure-results
          path: reports/allure-results/

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: logs/

  # ── Regression Tests ─────────────────────────────────────────────────────
  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.test_suite == 'regression' ||
      github.event.inputs.test_suite == 'all'

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p logs reports/html reports/allure-results

      - name: Run regression tests (parallel)
        env:
          ENV: ${{ github.event.inputs.environment || 'dev' }}
          DEV_BASE_URL: ${{ secrets.DEV_BASE_URL || 'https://jsonplaceholder.typicode.com' }}
          AUTH_USERNAME: ${{ secrets.AUTH_USERNAME || '' }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD || '' }}
          LOG_LEVEL: WARNING
        run: |
          pytest tests/regression \
            -m regression \
            -n auto \
            --alluredir=reports/allure-results \
            --html=reports/html/regression_report_py${{ matrix.python-version }}.html \
            --self-contained-html \
            -v

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-py${{ matrix.python-version }}
          path: |
            reports/html/
            logs/

  # ── Integration Tests ────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: regression
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.test_suite == 'integration' ||
      github.event.inputs.test_suite == 'all'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p logs reports/html reports/allure-results

      - name: Run integration tests
        env:
          ENV: ${{ github.event.inputs.environment || 'dev' }}
          DEV_BASE_URL: ${{ secrets.DEV_BASE_URL || 'https://jsonplaceholder.typicode.com' }}
          LOG_LEVEL: WARNING
        run: |
          pytest tests/integration \
            -m integration \
            --alluredir=reports/allure-results \
            --html=reports/html/integration_report.html \
            --self-contained-html \
            -v

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report
          path: reports/html/

  # ── Publish Allure Report ────────────────────────────────────────────────
  publish-allure:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: [smoke, regression, integration]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: "*-allure-results"
          merge-multiple: true
          path: allure-results

      - name: Generate and publish Allure report
        uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
